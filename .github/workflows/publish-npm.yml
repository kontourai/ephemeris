name: Publish NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm pack --dry-run

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('node:fs').readFileSync('package.json','utf8') && JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version")
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" FETCH_HEAD; then
            echo "Tagged commit ${GITHUB_SHA} is not reachable from origin/main" >&2
            exit 1
          fi

      - name: Skip if already published
        id: published
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
            echo "${NAME}@${VER} already published; skipping."
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish
        if: steps.published.outputs.published != 'true'
        run: npm publish --access public --provenance
